name: 'Deploy — Provision Kubernetes Resources (ms-order-service)'
description: >
  Creates namespace, ConfigMap, Secrets and Datadog Agent for ms-order-service.
  All operations are idempotent — safe to run on every deploy.

inputs:
  app_name:
    description: 'Application name'
    required: true
  namespace:
    description: 'Kubernetes namespace'
    required: true
  version:
    description: 'Application version'
    required: true
  server_port:
    description: 'Port the application listens on'
    required: false
    default: '8082'
  # Database
  rds_address:
    description: 'RDS endpoint address (db_ms2)'
    required: true
  rds_port:
    description: 'RDS port'
    required: true
  rds_dbname:
    description: 'RDS database name (db_ms2)'
    required: true
  rds_user:
    description: 'RDS username'
    required: true
  # AWS
  aws_region:
    description: 'AWS region for SQS/DynamoDB'
    required: false
    default: 'us-east-1'
  # DynamoDB
  dynamodb_table:
    description: 'DynamoDB order_history table name'
    required: false
    default: 'order_history'
  # SQS
  sqs_inventory_op_requested_url:
    description: 'SQS queue URL — order-inventory-op-requested (MS2 publishes → MS3)'
    required: false
    default: ''
  sqs_inventory_op_succeeded_url:
    description: 'SQS queue URL — order-inventory-op-succeeded (MS3 → MS2)'
    required: false
    default: ''
  sqs_inventory_op_failed_url:
    description: 'SQS queue URL — order-inventory-op-failed (MS3 → MS2)'
    required: false
    default: ''
  sqs_customer_deleted_url:
    description: 'SQS queue URL — customer-deleted (MS1 → MS2)'
    required: false
    default: ''
  # Inter-service URLs
  ms1_base_url:
    description: 'ms-identity base URL override — se vazio, deriva automaticamente de ms1_app_name'
    required: false
    default: ''
  ms1_app_name:
    description: 'APP_NAME do ms-identity — usado para derivar http://{name}-service:8081'
    required: false
    default: 'ms-identity'
  ms3_base_url:
    description: 'ms-workshop base URL override — se vazio, deriva automaticamente de ms3_app_name'
    required: false
    default: ''
  ms3_app_name:
    description: 'APP_NAME do ms-workshop — usado para derivar http://{name}-service:8083'
    required: false
    default: 'ms-workshop'
  # Mercado Pago
  mp_notification_url:
    description: 'Public URL for Mercado Pago webhook callbacks'
    required: false
    default: ''
  # SMTP
  smtp_host:
    description: 'SMTP host for email notifications'
    required: false
    default: 'smtp.gmail.com'
  smtp_port:
    description: 'SMTP port'
    required: false
    default: '587'
  smtp_username:
    description: 'SMTP username'
    required: false
    default: ''
  smtp_from:
    description: 'SMTP from address'
    required: false
    default: ''
  # Application secrets
  db_password:
    description: 'Database password'
    required: true
  jwt_secret_key:
    description: 'JWT signing secret (shared across all MSs)'
    required: true
  # AWS credentials — required for SQS/SNS access from pods
  aws_access_key_id:
    description: 'AWS Access Key ID'
    required: true
  aws_secret_access_key:
    description: 'AWS Secret Access Key'
    required: true
  aws_session_token:
    description: 'AWS Session Token (temporary credentials)'
    required: false
    default: ''
  smtp_password:
    description: 'SMTP password'
    required: false
    default: ''
  mp_access_token:
    description: 'Mercado Pago access token'
    required: false
    default: ''
  mp_webhook_secret:
    description: 'Mercado Pago webhook signature secret'
    required: false
    default: ''
  # Registry pull secret
  ghcr_pat:
    description: 'GitHub Container Registry personal access token'
    required: true
  github_actor:
    description: 'GitHub actor'
    required: true
  # Datadog
  dd_api_key:
    description: 'Datadog API key'
    required: true
  dd_app_key:
    description: 'Datadog application key'
    required: true
  dd_site:
    description: 'Datadog site (e.g. datadoghq.com)'
    required: true
  datadog_chart_version:
    description: 'Datadog Helm chart version'
    required: false
    default: '3.75.0'

runs:
  using: composite
  steps:
    - name: Create Namespace
      shell: bash
      run: kubectl apply -f k8s/namespace.yaml

    - name: Create ConfigMap
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        MS1_BASE_URL_INPUT: ${{ inputs.ms1_base_url }}
        MS1_APP_NAME: ${{ inputs.ms1_app_name }}
        MS3_BASE_URL_INPUT: ${{ inputs.ms3_base_url }}
        MS3_APP_NAME: ${{ inputs.ms3_app_name }}
      run: |
        # Auto-derive inter-service URLs from APP_NAME if not explicitly provided
        MS1_URL="${MS1_BASE_URL_INPUT}"
        [ -z "$MS1_URL" ] && MS1_URL="http://${MS1_APP_NAME}-service:8081"
        MS3_URL="${MS3_BASE_URL_INPUT}"
        [ -z "$MS3_URL" ] && MS3_URL="http://${MS3_APP_NAME}-service:8083"
        echo "::notice::MS1_BASE_URL=${MS1_URL}"
        echo "::notice::MS3_BASE_URL=${MS3_URL}"

        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: $APP_NAME-config
          namespace: ${{ inputs.namespace }}
        data:
          DB_HOST: "${{ inputs.rds_address }}"
          DB_PORT: "${{ inputs.rds_port }}"
          DB_NAME: "${{ inputs.rds_dbname }}"
          DB_USER: "${{ inputs.rds_user }}"
          SERVER_PORT: "${{ inputs.server_port }}"
          APP_ENV: "production"
          APP_VERSION: "${{ inputs.version }}"
          OTEL_SERVICE_NAME: "ms-order-service"
          AWS_REGION: "${{ inputs.aws_region }}"
          DYNAMODB_TABLE_ORDER_HISTORY: "${{ inputs.dynamodb_table }}"
          ORDER_INVENTORY_OP_REQUESTED_QUEUE_URL: "${{ inputs.sqs_inventory_op_requested_url }}"
          ORDER_INVENTORY_OP_SUCCEEDED_QUEUE_URL: "${{ inputs.sqs_inventory_op_succeeded_url }}"
          ORDER_INVENTORY_OP_FAILED_QUEUE_URL: "${{ inputs.sqs_inventory_op_failed_url }}"
          CUSTOMER_DELETED_QUEUE_URL: "${{ inputs.sqs_customer_deleted_url }}"
          MS1_BASE_URL: "${MS1_URL}"
          MS3_BASE_URL: "${MS3_URL}"
          MP_NOTIFICATION_URL: "${{ inputs.mp_notification_url }}"
          SMTP_HOST: "${{ inputs.smtp_host }}"
          SMTP_PORT: "${{ inputs.smtp_port }}"
          SMTP_USERNAME: "${{ inputs.smtp_username }}"
          SMTP_FROM: "${{ inputs.smtp_from }}"
        EOF
        echo "::notice::ConfigMap $APP_NAME-config created"

    - name: Create Secrets
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
      run: |
        kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=${{ inputs.github_actor }} \
          --docker-password=${{ inputs.ghcr_pat }} \
          --docker-email=${{ inputs.github_actor }}@users.noreply.github.com \
          -n ${{ inputs.namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic "$APP_NAME-secret" \
          --from-literal=DB_PASSWORD=${{ inputs.db_password }} \
          --from-literal=JWT_SECRET_KEY=${{ inputs.jwt_secret_key }} \
          --from-literal=SMTP_PASSWORD=${{ inputs.smtp_password }} \
          --from-literal=MP_ACCESS_TOKEN=${{ inputs.mp_access_token }} \
          --from-literal=MP_WEBHOOK_SECRET=${{ inputs.mp_webhook_secret }} \
          --from-literal=AWS_ACCESS_KEY_ID=${{ inputs.aws_access_key_id }} \
          --from-literal=AWS_SECRET_ACCESS_KEY=${{ inputs.aws_secret_access_key }} \
          --from-literal=AWS_SESSION_TOKEN=${{ inputs.aws_session_token }} \
          -n ${{ inputs.namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic datadog-secret \
          --from-literal=api-key=${{ inputs.dd_api_key }} \
          --from-literal=app-key=${{ inputs.dd_app_key }} \
          -n ${{ inputs.namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "::notice::Secrets created"

    - name: Deploy Datadog Agent
      shell: bash
      env:
        DD_SITE: ${{ inputs.dd_site }}
        CHART_VERSION: ${{ inputs.datadog_chart_version }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        helm repo add datadog https://helm.datadoghq.com

        INSTALLED=$(helm list -n "$NAMESPACE" -o json 2>/dev/null \
          | jq -r '.[] | select(.name=="datadog") | .chart' || echo "")
        TARGET="datadog-${CHART_VERSION}"

        if [ "$INSTALLED" == "$TARGET" ]; then
          echo "::notice::Datadog $CHART_VERSION already installed — skipping"
        else
          helm upgrade --install datadog datadog/datadog \
            --namespace "$NAMESPACE" \
            --version "$CHART_VERSION" \
            -f k8s/datadog/values.yaml \
            --set datadog.site="$DD_SITE" \
            --wait --timeout 10m
          echo "::notice::Datadog Agent deployed"
        fi
