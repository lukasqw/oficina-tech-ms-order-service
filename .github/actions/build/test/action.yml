name: 'Build — Test & Coverage'
description: >
  Extracts the version from the branch name or tag, runs Go tests with coverage,
  and uploads the coverage artifact. Output 'version' is consumed by downstream jobs.

inputs:
  go_version:
    description: 'Go version to use'
    required: false
    default: '1.25'
  go_main_path:
    description: 'Path to the Go main package entry point'
    required: false
    default: 'cmd/api/main.go'
  app_name:
    description: 'Application name — used as binary filename (e.g. oficina-tech)'
    required: false
    default: 'app'
  bdd_full_integration:
    description: 'Set to true to run the full BDD suite (requires MS1, MS2, MS3 and MP mock live)'
    required: false
    default: 'false'
  ms1_url:
    description: 'MS1 base URL for BDD'
    required: false
    default: 'http://localhost:8081'
  ms2_url:
    description: 'MS2 base URL for BDD'
    required: false
    default: 'http://localhost:8082'
  ms3_url:
    description: 'MS3 base URL for BDD'
    required: false
    default: 'http://localhost:8083'
  mp_mock_url:
    description: 'Mercado Pago mock URL for BDD'
    required: false
    default: 'http://localhost:9999'
  mp_webhook_secret:
    description: 'MP webhook signing secret for BDD'
    required: false
    default: 'e2e-webhook-secret'
  admin_email:
    description: 'Admin email for BDD auth'
    required: false
    default: 'admin@oficina.test'
  admin_password:
    description: 'Admin password for BDD auth'
    required: false
    default: 'admin1234'

outputs:
  version:
    description: 'Resolved version tag (e.g. v1.2.0)'
    value: ${{ steps.version.outputs.VERSION }}

runs:
  using: composite
  steps:
    # Resolves the version to deploy:
    #   - workflow_dispatch: uses the provided image_tag input (or latest git tag)
    #   - pull_request closed: extracts from branch name release/vX.Y.Z
    - name: Extract Version
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.image_tag }}"
          if [ "$TAG" == "latest" ]; then
            TAG=$(git describe --tags --sort=-v:refname 2>/dev/null | head -1 || echo "v0.0.0")
          fi
        else
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          TAG=${BRANCH_NAME#release/}
        fi
        echo "VERSION=$TAG" >> $GITHUB_OUTPUT
        echo "::notice::Version: $TAG"

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: true

    - name: Run Tests
      shell: bash
      run: |
        go mod download
        # Exclude infra-only and live-dependency packages from coverage.
        # Criteria: wiring/DI facades, pure-struct packages, packages that require
        # a live AWS/DB/SMTP endpoint and cannot be tested with mocks.
        SKIP='/internal/modules/service_order$'
        SKIP+='|/internal/modules/service_order/infra/http$'
        SKIP+='|/internal/modules/service_order/infra/http/dto$'
        SKIP+='|/internal/modules/service_order/infra/persistence$'
        SKIP+='|/internal/modules/service_order/infra/adapters$'
        SKIP+='|/internal/modules/service_order/infra/adapters/implementations$'
        SKIP+='|/internal/shared/dto$'
        SKIP+='|/internal/shared/infra/awsconfig$'
        SKIP+='|/internal/shared/infra/database$'
        SKIP+='|/internal/shared/infra/dynamodb$'
        SKIP+='|/internal/shared/infra/email$'
        SKIP+='|/internal/shared/infra/sqs$'
        SKIP+='|/internal/messaging/events$'
        PKGS=$(go list ./internal/... | grep -vE "$SKIP")
        go test ${PKGS} -v -coverprofile=coverage.out -covermode=atomic 2>&1 | tee /tmp/test-output.txt
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

    - name: Coverage Summary
      if: always()
      shell: bash
      run: |
        if [ ! -f coverage.out ]; then
          echo "coverage.out not found — tests may have failed before coverage was written"
          exit 0
        fi

        # Total coverage %
        TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')

        # Per-package coverage
        PACKAGES=$(go tool cover -func=coverage.out \
          | grep -v '^total:' \
          | awk '{print $1}' \
          | sed 's|/[^/]*$||' \
          | sort -u)

        {
          echo "## Test Coverage — ${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "| | |"
          echo "|---|---|"
          echo "| **Total** | **$TOTAL** |"
          echo "| Go version | \`${{ inputs.go_version }}\` |"
          echo ""

          # Coverage badge thresholds
          TOTAL_NUM=${TOTAL//%/}
          if awk "BEGIN{exit !($TOTAL_NUM >= 70)}"; then
            echo "> **Coverage is healthy ($TOTAL)**"
          elif awk "BEGIN{exit !($TOTAL_NUM >= 50)}"; then
            echo "> **Coverage is moderate ($TOTAL) — consider adding tests**"
          else
            echo "> **Coverage is low ($TOTAL) — tests needed**"
          fi

          echo ""
          echo "### Per-package"
          echo ""
          echo "| Package | Coverage |"
          echo "|---------|----------|"

          go tool cover -func=coverage.out \
            | grep -v '^total:' \
            | awk '
              {
                split($1, parts, ":")
                pkg = parts[1]
                fn  = parts[2]
                cov = $3
                gsub(/.*\//, "", pkg)
                pkgfull[fn] = $1
                if (!(pkg in best) || cov+0 > best[pkg]+0) {
                  best[pkg] = cov
                  label[pkg] = pkg
                }
              }
              END {
                for (p in label) print "| `" label[p] "` | " best[p] " |"
              }
            ' \
            | sort

          echo ""
          echo "### Failed Tests"
          echo ""
          echo "\`\`\`"
          grep -E "^--- FAIL|^FAIL" /tmp/test-output.txt || echo "All tests passed"
          echo "\`\`\`"
        } >> $GITHUB_STEP_SUMMARY

    - name: Coverage Gate
      shell: bash
      run: |
        if [ ! -f coverage.out ]; then
          echo "::error::coverage.out not found"
          exit 1
        fi
        COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/ { sub(/%/, "", $3); print $3 }')
        echo "Coverage: ${COVERAGE}%"
        awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 70.0) }' || \
          (echo "::error::Coverage ${COVERAGE}% is below the 70% threshold" && exit 1)

    - name: Run BDD Tests
      shell: bash
      run: |
        go test ./bdd/... -count=1 -v 2>&1 | tail -40
        # Exit code is always 0 when BDD_FULL_INTEGRATION is not set
        # (all @integration scenarios are skipped gracefully).
      env:
        BDD_FULL_INTEGRATION: ${{ inputs.bdd_full_integration }}
        MS1_URL: ${{ inputs.ms1_url }}
        MS2_URL: ${{ inputs.ms2_url }}
        MS3_URL: ${{ inputs.ms3_url }}
        MP_MOCK_URL: ${{ inputs.mp_mock_url }}
        MP_WEBHOOK_SECRET: ${{ inputs.mp_webhook_secret }}
        ADMIN_EMAIL: ${{ inputs.admin_email }}
        ADMIN_PASSWORD: ${{ inputs.admin_password }}

    - name: Build Binary
      shell: bash
      run: |
        mkdir -p bin
        go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
          -o bin/${{ inputs.app_name }} ${{ inputs.go_main_path }}
        echo "::notice::Binary built: bin/${{ inputs.app_name }}"

    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ steps.version.outputs.VERSION }}
        path: bin/${{ inputs.app_name }}
        retention-days: 1

    - name: Upload Coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 1
