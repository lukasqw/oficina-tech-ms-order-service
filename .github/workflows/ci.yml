name: CI

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Vet & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION || '1.25' }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run Unit Tests
        run: |
          SKIP='/internal/modules/service_order$'
          SKIP+='|/internal/modules/service_order/infra/http$'
          SKIP+='|/internal/modules/service_order/infra/http/dto$'
          SKIP+='|/internal/modules/service_order/infra/persistence$'
          SKIP+='|/internal/modules/service_order/infra/adapters$'
          SKIP+='|/internal/modules/service_order/infra/adapters/implementations$'
          SKIP+='|/internal/shared/dto$'
          SKIP+='|/internal/shared/infra/awsconfig$'
          SKIP+='|/internal/shared/infra/database$'
          SKIP+='|/internal/shared/infra/dynamodb$'
          SKIP+='|/internal/shared/infra/email$'
          SKIP+='|/internal/shared/infra/sqs$'
          SKIP+='|/internal/messaging/events$'
          PKGS=$(go list ./internal/... | grep -vE "$SKIP")
          go test ${PKGS} -v -coverprofile=coverage.out -covermode=atomic

      - name: Coverage Gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/ { sub(/%/, "", $3); print $3 }')
          echo "Coverage: ${COVERAGE}%"
          awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 80.0) }' || \
            (echo "::error::Coverage ${COVERAGE}% is below the 80% threshold" && exit 1)

